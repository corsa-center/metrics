name: Collect Metrics

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      software_filter:
        description: 'Filter to specific software (optional)'
        required: false
        type: string
      dry_run:
        description: 'Perform dry run (no artifact upload)'
        required: false
        type: boolean
        default: false

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout metrics repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml

      - name: Run orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
        run: |
          SOFTWARE_ARG="${{ github.event.inputs.software_filter }}"
          DRY_RUN_ARG="${{ github.event.inputs.dry_run }}"

          CMD="python orchestrator.py --config config/orchestrator.yaml"

          if [ -n "$SOFTWARE_ARG" ]; then
            CMD="$CMD --software $SOFTWARE_ARG"
          fi

          if [ "$DRY_RUN_ARG" = "true" ]; then
            CMD="$CMD --dry-run"
            echo "::notice::Running in dry-run mode, no artifact will be uploaded"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Upload metrics artifact
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sustainability-metrics
          path: output/*-metrics/
          retention-days: 90

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-reports
          path: |
            output/*.json
            *.log
          retention-days: 30

      - name: Create summary
        run: |
          echo "## Metrics Collection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f output/orchestrator_summary.json ]; then
            TOTAL=$(jq -r '.total_packages' output/orchestrator_summary.json)
            AVG_SCORE=$(jq -r '.avg_overall_score' output/orchestrator_summary.json)

            echo "- **Total Packages:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Average Score:** $(printf '%.1f' $AVG_SCORE)/100" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### Score Distribution" >> $GITHUB_STEP_SUMMARY
            jq -r '.packages_by_score | to_entries[] | "- **\(.key):** \(.value)"' output/orchestrator_summary.json >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Top 5 Packages" >> $GITHUB_STEP_SUMMARY
            jq -r '.top_packages[:5][] | "- \(.[0]): \(.[1])/100"' output/orchestrator_summary.json >> $GITHUB_STEP_SUMMARY
          fi
