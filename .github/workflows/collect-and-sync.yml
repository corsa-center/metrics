name: Collect Metrics and Sync to Dashboard

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual triggers
    inputs:
      software_filter:
        description: 'Filter to specific software (optional)'
        required: false
        type: string
      dry_run:
        description: 'Perform dry run without pushing'
        required: false
        type: boolean
        default: false

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout metrics repository
        uses: actions/checkout@v4
        with:
          path: metrics

      - name: Checkout dashboard repository
        uses: actions/checkout@v4
        with:
          repository: brtnfld/dashboard
          path: dashboard
          token: ${{ secrets.DASHBOARD_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: metrics
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml

      - name: Run orchestrator
        working-directory: metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
        run: |
          SOFTWARE_ARG="${{ github.event.inputs.software_filter }}"
          DRY_RUN_ARG="${{ github.event.inputs.dry_run }}"

          CMD="python orchestrator.py --config config/orchestrator.yaml"

          if [ -n "$SOFTWARE_ARG" ]; then
            CMD="$CMD --software $SOFTWARE_ARG"
          fi

          if [ "$DRY_RUN_ARG" = "true" ]; then
            CMD="$CMD --dry-run"
            echo "::notice::Running in dry-run mode, no files will be committed"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Check for changes
        if: github.event.inputs.dry_run != 'true'
        id: check_changes
        working-directory: dashboard
        run: |
          git diff --quiet explore/github-data/sustainabilityMetrics.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push to dashboard
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        working-directory: dashboard
        run: |
          git config user.name "CORSA Metrics Bot"
          git config user.email "metrics-bot@corsa.center"

          git add explore/github-data/sustainabilityMetrics.json

          # Create commit message with summary
          PACKAGE_COUNT=$(jq 'length' explore/github-data/sustainabilityMetrics.json)

          git commit -m "Update sustainability metrics

          - Updated metrics for $PACKAGE_COUNT packages
          - Collection date: $(date -u +%Y-%m-%d)
          - Automated update via orchestrator

          [skip ci]"

          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: metrics-reports
          path: |
            metrics/output/*.json
            metrics/*.log
          retention-days: 30

      - name: Create summary
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "## Metrics Collection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f metrics/output/orchestrator_summary.json ]; then
            TOTAL=$(jq -r '.total_packages' metrics/output/orchestrator_summary.json)
            AVG_SCORE=$(jq -r '.avg_overall_score' metrics/output/orchestrator_summary.json)

            echo "- **Total Packages:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Average Score:** $(printf '%.1f' $AVG_SCORE)/100" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### Score Distribution" >> $GITHUB_STEP_SUMMARY
            jq -r '.packages_by_score | to_entries[] | "- **\(.key):** \(.value)"' metrics/output/orchestrator_summary.json >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Top 5 Packages" >> $GITHUB_STEP_SUMMARY
            jq -r '.top_packages[:5][] | "- \(.[0]): \(.[1])/100"' metrics/output/orchestrator_summary.json >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Metrics successfully synced to dashboard repository" >> $GITHUB_STEP_SUMMARY
