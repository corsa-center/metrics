# Orchestrator Configuration
# Coordinates metrics collection and dashboard integration
#
# Based on CASS Sustainability Metrics Report v3 (3 dimensions):
#   4.1 Impact, 4.2 Sustainability, 4.3 Quality

# Dashboard catalog URL (served via GitHub Pages)
dashboard_base_url: "https://corsa.center/dashboard"
output_path: "./output"              # Local output directory (published to GitHub Pages)

# Enable/disable CASS dimension collectors
collectors:
  impact: true              # 4.1 Impact (citation, adoption, field research impact)
  sustainability: true      # 4.2 Sustainability (governance, licensing, maintenance, engagement, ...)
  quality: false            # 4.3 Quality (reliability, dev practices, reproducibility, usability, ...)

# API credentials
api_credentials:
  github:
    token: ${GITHUB_TOKEN}  # Set via environment variable
  semantic_scholar:
    api_key: ${SEMANTIC_SCHOLAR_KEY}  # Optional, improves rate limits
  openalex:
    email: ${OPENALEX_EMAIL}  # Polite pool access
  zenodo:
    # No auth required for public API

# Metric weights for overall score calculation (CASS dimensions)
# Note: Weights should sum to 1.0
metric_weights:
  impact: 0.33             # 33% weight - Research impact, citation, and adoption
  sustainability: 0.34     # 34% weight - Governance, licensing, maintenance, engagement
  quality: 0.33            # 33% weight - Reliability, dev practices, usability

# Rate limiting
rate_limiting:
  delay_between_packages: 2  # seconds
  api_retry_attempts: 3
  api_retry_delay: 5  # seconds

# Filters
filters:
  # Only process packages in these categories (empty = all)
  categories: []
  # Exclude specific repositories
  exclude_repos: []
  # Minimum stars threshold (0 = no minimum)
  min_stars: 0

# Output options
output:
  dashboard_format: true    # Generate sustainabilityMetrics.json
  detailed_reports: true    # Generate per-package detailed reports
  summary_report: true      # Generate summary statistics
  csv_export: false         # Export to CSV format

# Logging
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  file: "orchestrator.log"
  console: true
