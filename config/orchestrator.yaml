# Orchestrator Configuration
# Coordinates metrics collection and dashboard integration

# Repository paths
dashboard_repo_path: "../dashboard"  # Path to dashboard repository
output_path: "./output"              # Local output directory

# Enable/disable collectors
# ✅ = Implemented, 🔄 = Placeholder (returns zeros/false)
collectors:
  citation: true          # ✅ Impact metrics (citations, mentions, dependents)
  community: false        # 🔄 Community health (contributors, activity, issues/PRs)
  licensing: true         # ✅ License analysis (SPDX, OSI approval)
  security: false         # 🔄 Security metrics (CVEs, advisories, policies)
  documentation: false    # 🔄 Documentation quality (README, API docs, tutorials)
  sustainability: false   # 🔄 Sustainability (maintenance, bus factor, funding)

# API credentials
api_credentials:
  github:
    token: ${GITHUB_TOKEN}  # Set via environment variable
  semantic_scholar:
    api_key: ${SEMANTIC_SCHOLAR_KEY}  # Optional, improves rate limits
  openalex:
    email: ${OPENALEX_EMAIL}  # Polite pool access
  zenodo:
    # No auth required for public API

# Metric weights for overall score calculation
# Note: Weights are only applied to enabled collectors
metric_weights:
  citation: 0.20       # 20% weight - Research impact
  community: 0.20      # 20% weight - Community health
  licensing: 0.10      # 10% weight - License compliance
  security: 0.20       # 20% weight - Security posture
  documentation: 0.15  # 15% weight - Documentation quality
  sustainability: 0.15 # 15% weight - Long-term viability

# Rate limiting
rate_limiting:
  delay_between_packages: 2  # seconds
  api_retry_attempts: 3
  api_retry_delay: 5  # seconds

# Filters
filters:
  # Only process packages in these categories (empty = all)
  categories: []
  # Exclude specific repositories
  exclude_repos: []
  # Minimum stars threshold (0 = no minimum)
  min_stars: 0

# Output options
output:
  dashboard_format: true    # Generate sustainabilityMetrics.json
  detailed_reports: true    # Generate per-package detailed reports
  summary_report: true      # Generate summary statistics
  csv_export: false         # Export to CSV format

# Logging
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  file: "orchestrator.log"
  console: true
