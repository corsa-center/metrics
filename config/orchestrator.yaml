# Orchestrator Configuration
# Coordinates metrics collection and dashboard integration

# Repository paths
dashboard_repo_path: "../dashboard"  # Path to dashboard repository
output_path: "./output"              # Local output directory

# Enable/disable CASS dimension collectors
# ✅ = Implemented, 🔄 = Placeholder (returns zeros/false)
collectors:
  impact: true          # ✅ Impact dimension (citations, adoption, field research impact)
  community: false      # 🔄 Community dimension (health, engagement, diversity)
  viability: true       # ✅ Viability dimension (sustainability, security, licensing)
  quality: false        # 🔄 Quality dimension (documentation, code quality, testing)

# API credentials
api_credentials:
  github:
    token: ${GITHUB_TOKEN}  # Set via environment variable
  semantic_scholar:
    api_key: ${SEMANTIC_SCHOLAR_KEY}  # Optional, improves rate limits
  openalex:
    email: ${OPENALEX_EMAIL}  # Polite pool access
  zenodo:
    # No auth required for public API

# Metric weights for overall score calculation (CASS dimensions)
# Note: Weights should sum to 1.0
metric_weights:
  impact: 0.25       # 25% weight - Research impact, citation, and adoption
  community: 0.25    # 25% weight - Community health, engagement, and diversity
  viability: 0.25    # 25% weight - Sustainability, security, and licensing
  quality: 0.25      # 25% weight - Documentation, code quality, and testing

# Rate limiting
rate_limiting:
  delay_between_packages: 2  # seconds
  api_retry_attempts: 3
  api_retry_delay: 5  # seconds

# Filters
filters:
  # Only process packages in these categories (empty = all)
  categories: []
  # Exclude specific repositories
  exclude_repos: []
  # Minimum stars threshold (0 = no minimum)
  min_stars: 0

# Output options
output:
  dashboard_format: true    # Generate sustainabilityMetrics.json
  detailed_reports: true    # Generate per-package detailed reports
  summary_report: true      # Generate summary statistics
  csv_export: false         # Export to CSV format

# Logging
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  file: "orchestrator.log"
  console: true
